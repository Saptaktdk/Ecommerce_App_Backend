services:
  api:
    container_name: ecommerce-app-backend
    build:
      context: ecommerce
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ecommerce_db
      DB_USERNAME: admin
      DB_PASSWORD: admin
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    restart: unless-stopped
